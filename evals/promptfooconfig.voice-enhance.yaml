# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json
description: Commerce AI — voice transcript enhancement evals

prompts:
  - "{{transcript}}"

providers:
  - id: file://providers/voice-enhance-provider.ts
    label: openrouter-gemini-31-lite
    config:
      provider: openrouter
      model: google/gemini-3.1-flash-lite-preview

defaultTest:
  assert:
    - type: javascript
      value: |
        return output.trim().length > 0;

tests:
  - file://tests/voice-enhance.yaml
