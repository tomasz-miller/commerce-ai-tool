- description: Red athletic shoes photo translated to Norwegian catalog
  vars:
    imageFile: red-shoes.jpeg
    queryLocale: en
    catalogLocale: no
  assert:
    - type: javascript
      value: |
        const terms = JSON.parse(output).searchTerms.join(' ').toLowerCase();
        return terms.includes('rød') || terms.includes('røde') || terms.includes('sko');

- description: Wallpaper knife or utility knife in a work context (Norwegian catalog)
  vars:
    imageFile: wallpaper-knife.jpeg
    queryLocale: pl
    catalogLocale: no
  assert:
    - type: javascript
      value: |
        const terms = JSON.parse(output).searchTerms.join(' ').toLowerCase();
        // Lifestyle fixture: model may return tapetkniv (ideal) or universalkniv (generic knife).
        return terms.includes('tapetkniv') || terms.includes('universalkniv');

- description: Forest landscape — non-commerce image still returns valid JSON
  vars:
    imageFile: sky-above-forest.jpeg
    queryLocale: en
    catalogLocale: no
  assert:
    - type: javascript
      value: |
        const parsed = JSON.parse(output);
        return typeof parsed.interpretation === 'string' && parsed.interpretation.length > 0;
