# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json
description: Commerce AI — text search interpretation evals

prompts:
  - "{{query}}"

providers:
  - id: file://providers/text-search-provider.ts
    label: openrouter
    config:
      # Override via OPENROUTER_MODEL in evals/.env, or set model here
      model: google/gemini-3.1-flash-lite-preview

defaultTest:
  assert:
    - type: is-json
    - type: javascript
      value: |
        const parsed = JSON.parse(output);
        return Array.isArray(parsed.searchTerms);

tests:
  - file://tests/text-search.yaml
