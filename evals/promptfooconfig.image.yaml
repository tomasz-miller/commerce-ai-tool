# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json
description: Commerce AI — image search interpretation evals

prompts:
  - "{{imageFile}}"

providers:
  - id: file://providers/image-search-provider.ts
    label: openrouter
    config:
      # Override via OPENROUTER_VISION_MODEL in evals/.env, or set visionModel here
      visionModel: google/gemini-3.1-flash-lite-preview

defaultTest:
  assert:
    - type: is-json
    - type: javascript
      value: |
        const parsed = JSON.parse(output);
        return Array.isArray(parsed.searchTerms);

tests:
  - file://tests/image-search.yaml
